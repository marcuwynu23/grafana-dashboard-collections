name: Bug Report
description: Report a reproducible problem
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
      placeholder: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: What did you expect to happen?
    validations:
      required: true
  - type: input
    id: grafana_version
    attributes:
      label: Grafana Version
      placeholder: e.g. 11.1.0
    validations:
      required: false
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      placeholder: Screenshots, logs, or links.
    validations:
      required: false
